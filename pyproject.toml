[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true
ignore_missing_imports = true
# Ensures mypy treats the root as a package base to avoid 'main' module conflicts
explicit_package_bases = true
mypy_path = "."
exclude = [
    '^venv/',
    '^chroma_db/',
    '^.mypy_cache/',
    '^.pytest_cache/',
    '^.ruff_cache/',
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# E (Error), F (Linter), W (Warning), I (Isort), N (Naming), UP (Upgrade), B (Bugbear), RUF (Ruff Specific)
select = ["E", "F", "W", "I", "N", "UP", "B", "RUF"]
ignore = ["E501"] # Line length handled by line-length setting
